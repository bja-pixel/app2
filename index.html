function NameModal({ onConfirm }) {
  const [name, setName] = useState("");
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(15,23,42,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999 }}>
      <div style={{ background:"white", borderRadius:"20px", padding:"40px", width:"380px", boxShadow:"0 20px 60px rgba(0,0,0,0.3)", textAlign:"center" }}>
        <div style={{ fontSize:"3rem", marginBottom:"12px" }}>🎓</div>
        <h2 style={{ fontSize:"1.3rem", color:"#0f172a", marginBottom:"8px" }}>CSS 마스터에 오신 걸 환영합니다!</h2>
        <p style={{ color:"#64748b", fontSize:"0.88rem", marginBottom:"28px", lineHeight:"1.5" }}>
          학습을 시작하기 전에 이름을 입력해주세요.<br />제출 시 선생님께 전달됩니다.
        </p>
        <input
          value={name}
          onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === "Enter" && name.trim() && onConfirm(name.trim())}
          placeholder="이름을 입력하세요"
          autoFocus
          style={{
            width:"100%", padding:"12px 16px", border:"2px solid #e2e8f0",
            borderRadius:"10px", fontSize:"1rem", outline:"none",
            marginBottom:"16px", textAlign:"center",
            transition:"border 0.2s",
          }}
          onFocus={e => e.target.style.borderColor = "#3b82f6"}
          onBlur={e => e.target.style.borderColor = "#e2e8f0"}
        />
        <button
          onClick={() => name.trim() && onConfirm(name.trim())}
          disabled={!name.trim()}
          style={{
            width:"100%", padding:"12px", background: name.trim() ? "linear-gradient(135deg,#3b82f6,#8b5cf6)" : "#e2e8f0",
            border:"none", borderRadius:"10px", color: name.trim() ? "white" : "#94a3b8",
            fontSize:"1rem", fontWeight:"600", cursor: name.trim() ? "pointer" : "default",
            transition:"all 0.2s",
          }}
        >
          학습 시작하기 →
        </button>
      </div>
    </div>
  );
}

function Toast({ msg, type }) {
  return (
    <div style={{
      position:"fixed", bottom:"24px", left:"50%", transform:"translateX(-50%)",
      background: type === "success" ? "#22c55e" : type === "error" ? "#ef4444" : "#3b82f6",
      color:"white", padding:"12px 24px", borderRadius:"12px",
      boxShadow:"0 8px 24px rgba(0,0,0,0.2)", fontSize:"0.9rem", fontWeight:"500",
      zIndex:9999, whiteSpace:"nowrap",
    }}>{msg}</div>
  );
}

function App() {
  const [studentName, setStudentName] = useState("");
  const [showNameModal, setShowNameModal] = useState(true);
  const [currentLesson, setCurrentLesson] = useState(0);
  const [cssCode, setCssCode] = useState(lessons[0].initialCSS);
  const [showHint, setShowHint] = useState(false);
  const [completed, setCompleted] = useState([]);
  const [activeTab, setActiveTab] = useState("editor");
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [submitting, setSubmitting] = useState(false);
  const [toast, setToast] = useState(null);
  const previewRef = useRef(null);
  const textareaRef = useRef(null);
  const lesson = lessons[currentLesson];

  useEffect(() => {
    setCssCode(lesson.initialCSS);
    setShowHint(false);
    setActiveTab("editor");
  }, [currentLesson]);

  useEffect(() => {
    if (previewRef.current) {
      previewRef.current.srcdoc = PREVIEW_WRAPPER(lesson.html, cssCode);
    }
  }, [cssCode, lesson]);

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  const handleHint = () => { setShowHint(true); setCssCode(lesson.hint); };
  const handleReset = () => { setCssCode(lesson.initialCSS); setShowHint(false); };

  const handleComplete = () => {
    if (!completed.includes(lesson.id)) setCompleted([...completed, lesson.id]);
    if (currentLesson < lessons.length - 1) setCurrentLesson(currentLesson + 1);
  };

  const handleSubmit = async () => {
    if (APPS_SCRIPT_URL === "YOUR_SCRIPT_URL_HERE") {
      showToast("⚠️ Apps Script URL을 설정해주세요!", "error"); return;
    }
    setSubmitting(true);
    showToast("📤 제출 중...", "info");
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          studentName,
          lessonNumber: lesson.id,
          lessonTitle: lesson.title,
          cssCode,
          completedCount: completed.length,
        }),
      });
      showToast(`✅ ${studentName}님의 코드가 제출되었습니다!`);
    } catch {
      showToast("❌ 제출 실패. 인터넷 연결을 확인해주세요.", "error");
    } finally {
      setSubmitting(false);
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === "Tab") {
      e.preventDefault();
      const s = e.target.selectionStart, en = e.target.selectionEnd;
      const v = cssCode.substring(0, s) + "  " + cssCode.substring(en);
      setCssCode(v);
      setTimeout(() => {
        if (textareaRef.current) {
          textareaRef.current.selectionStart = s + 2;
          textareaRef.current.selectionEnd = s + 2;
        }
      }, 0);
    }
  };

  const categories = [...new Set(lessons.map(l => l.category))];
  const progress = Math.round((completed.length / lessons.length) * 100);

  return (
    <div style={{ display:"flex", height:"100vh", fontFamily:"'Segoe UI',sans-serif", background:"#f8fafc", overflow:"hidden", position:"relative" }}>

      {showNameModal && (
        <NameModal onConfirm={name => { setStudentName(name); setShowNameModal(false); }} />
      )}
      {toast && <Toast msg={toast.msg} type={toast.type} />}

      {/* ── 사이드바 ── */}
      {sidebarOpen && (
        <div style={{ width:"230px", background:"#1e293b", color:"white", overflowY:"auto", flexShrink:0, display:"flex", flexDirection:"column" }}>
          <div style={{ padding:"16px 16px 12px", borderBottom:"1px solid #334155" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"4px" }}>
              <div style={{ fontSize:"1rem", fontWeight:"700", color:"#f1f5f9" }}>🎓 CSS 마스터</div>
              <button onClick={() => setSidebarOpen(false)} style={{ background:"none", border:"none", color:"#64748b", cursor:"pointer", fontSize:"1rem" }}>✕</button>
            </div>
            {studentName && (
              <div style={{ fontSize:"0.75rem", color:"#7dd3fc", marginBottom:"6px" }}>👤 {studentName}</div>
            )}
            <div style={{ fontSize:"0.72rem", color:"#64748b" }}>{completed.length}/{lessons.length} 완료 · {progress}%</div>
            <div style={{ height:"4px", background:"#334155", borderRadius:"4px", marginTop:"6px", overflow:"hidden" }}>
              <div style={{ height:"100%", background:"linear-gradient(90deg,#3b82f6,#8b5cf6)", width:`${progress}%`, borderRadius:"4px", transition:"width 0.5s" }} />
            </div>
          </div>

          {categories.map(cat => (
            <div key={cat}>
              <div style={{ padding:"10px 16px 5px", fontSize:"0.67rem", color:"#64748b", textTransform:"uppercase", letterSpacing:"0.08em", fontWeight:"600" }}>{cat}</div>
              {lessons.filter(l => l.category === cat).map(l => {
                const idx = lessons.indexOf(l);
                const isActive = currentLesson === idx;
                const isDone = completed.includes(l.id);
                return (
                  <button key={l.id} onClick={() => setCurrentLesson(idx)} style={{
                    width:"100%", textAlign:"left", background: isActive ? "#3b82f6" : "transparent",
                    border:"none", color: isActive ? "white" : isDone ? "#86efac" : "#cbd5e1",
                    padding:"8px 16px", cursor:"pointer", fontSize:"0.83rem",
                    display:"flex", alignItems:"center", gap:"8px",
                    borderLeft: isActive ? "3px solid #60a5fa" : "3px solid transparent",
                  }}>
                    <span>{l.emoji}</span>
                    <span style={{ flex:1 }}>{l.title}</span>
                    {isDone && <span style={{ fontSize:"0.68rem", color:"#86efac" }}>✓</span>}
                  </button>
                );
              })}
            </div>
          ))}

          <div style={{ padding:"16px", marginTop:"auto", borderTop:"1px solid #334155" }}>
            <button
              onClick={handleSubmit}
              disabled={submitting}
              style={{
                width:"100%", padding:"10px", background: submitting ? "#334155" : "linear-gradient(135deg,#22c55e,#16a34a)",
                border:"none", borderRadius:"10px", color:"white", fontSize:"0.85rem",
                fontWeight:"600", cursor: submitting ? "default" : "pointer",
              }}
            >
              {submitting ? "제출 중..." : "📤 현재 코드 제출"}
            </button>
            <div style={{ fontSize:"0.68rem", color:"#475569", textAlign:"center", marginTop:"6px" }}>
              선생님 구글 시트로 전송됩니다
            </div>
          </div>
        </div>
      )}

      {/* ── 메인 영역 ── */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>

        {/* 헤더 */}
        <div style={{ background:"white", borderBottom:"1px solid #e2e8f0", padding:"10px 16px", display:"flex", alignItems:"center", gap:"10px", flexShrink:0 }}>
          {!sidebarOpen && (
            <button onClick={() => setSidebarOpen(true)} style={{ background:"#f1f5f9", border:"1px solid #e2e8f0", borderRadius:"8px", padding:"6px 10px", cursor:"pointer", color:"#475569", fontSize:"0.9rem" }}>☰</button>
          )}
          <span style={{ fontSize:"1.4rem" }}>{lesson.emoji}</span>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontWeight:"700", color:"#0f172a", fontSize:"1rem" }}>{lesson.title}</div>
            <div style={{ fontSize:"0.75rem", color:"#64748b", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{lesson.description}</div>
          </div>
          <div style={{ display:"flex", gap:"6px", flexShrink:0, alignItems:"center" }}>
            {studentName && (
              <span style={{ fontSize:"0.78rem", color:"#64748b", background:"#f1f5f9", padding:"4px 10px", borderRadius:"20px", border:"1px solid #e2e8f0" }}>
                👤 {studentName}
              </span>
            )}
            <button onClick={handleReset} style={{ padding:"7px 12px", background:"#f1f5f9", border:"1px solid #e2e8f0", borderRadius:"8px", cursor:"pointer", color:"#475569", fontSize:"0.78rem", fontWeight:"500" }}>↩ 초기화</button>
            <button onClick={handleHint} style={{ padding:"7px 12px", background:"#fef3c7", border:"1px solid #fcd34d", borderRadius:"8px", cursor:"pointer", color:"#92400e", fontSize:"0.78rem", fontWeight:"500" }}>💡 힌트</button>
            <button onClick={handleSubmit} disabled={submitting} style={{ padding:"7px 12px", background: submitting ? "#e2e8f0" : "#dcfce7", border:"1px solid #86efac", borderRadius:"8px", cursor:"pointer", color:"#15803d", fontSize:"0.78rem", fontWeight:"600" }}>
              📤 제출
            </button>
            <button onClick={handleComplete} style={{ padding:"7px 12px", background:"linear-gradient(135deg,#3b82f6,#8b5cf6)", border:"none", borderRadius:"8px", cursor:"pointer", color:"white", fontSize:"0.78rem", fontWeight:"600" }}>
              {currentLesson < lessons.length - 1 ? "완료 & 다음 →" : "🎉 완료!"}
            </button>
          </div>
        </div>

        {/* 콘텐츠 */}
        <div style={{ flex:1, display:"flex", overflow:"hidden" }}>

          {/* 왼쪽: 편집기/이론 */}
          <div style={{ width:"48%", display:"flex", flexDirection:"column", borderRight:"1px solid #e2e8f0", overflow:"hidden", flexShrink:0 }}>
            <div style={{ display:"flex", background:"#f8fafc", borderBottom:"1px solid #e2e8f0", flexShrink:0 }}>
              {[{ id:"editor", label:"✏️ CSS 편집기" }, { id:"theory", label:"📖 개념 정리" }].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
                  flex:1, padding:"10px", border:"none",
                  background: activeTab === tab.id ? "white" : "transparent",
                  cursor:"pointer", fontSize:"0.79rem",
                  fontWeight: activeTab === tab.id ? "600" : "400",
                  color: activeTab === tab.id ? "#3b82f6" : "#64748b",
                  borderBottom: activeTab === tab.id ? "2px solid #3b82f6" : "2px solid transparent",
                }}>{tab.label}</button>
              ))}
            </div>

            {activeTab === "editor" ? (
              <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                <div style={{ padding:"8px 16px", background:"#eff6ff", borderBottom:"1px solid #bfdbfe", fontSize:"0.77rem", color:"#1d4ed8", flexShrink:0 }}>
                  🎯 <strong>미션:</strong> {lesson.challenge}
                </div>
                {showHint && (
                  <div style={{ padding:"6px 16px", background:"#fef9c3", borderBottom:"1px solid #fde047", fontSize:"0.74rem", color:"#713f12", flexShrink:0 }}>
                    💡 힌트 적용됨 — 코드를 분석하며 학습해보세요!
                  </div>
                )}
                <textarea
                  ref={textareaRef}
                  value={cssCode}
                  onChange={e => setCssCode(e.target.value)}
                  onKeyDown={handleKeyDown}
                  spellCheck={false}
                  style={{
                    flex:1, border:"none", outline:"none", padding:"14px", resize:"none",
                    fontFamily:"'Courier New','Monaco',monospace", fontSize:"0.82rem",
                    lineHeight:"1.65", background:"#0f172a", color:"#e2e8f0", overflowY:"auto",
                  }}
                />
                <div style={{ padding:"5px 14px", background:"#1e293b", color:"#475569", fontSize:"0.68rem", display:"flex", gap:"16px", flexShrink:0 }}>
                  <span>Tab: 들여쓰기</span><span>실시간 미리보기 ✓</span>
                </div>
              </div>
            ) : (
              /* ── 개념 정리 탭 ── */
              <div style={{ flex:1, overflowY:"auto", padding:"14px", background:"#f8fafc" }}>

                {/* 상단 미션 배너 */}
                <div style={{ background:"linear-gradient(135deg,#eff6ff,#f0fdf4)", border:"1px solid #bfdbfe", borderRadius:"10px", padding:"10px 14px", marginBottom:"14px", fontSize:"0.78rem", color:"#1d4ed8" }}>
                  🎯 <strong>이번 미션:</strong> {lesson.challenge}
                </div>

                {/* 개념 상세 카드들 */}
                {lesson.conceptDetail && lesson.conceptDetail.map((item, i) => (
                  <ConceptCard key={i} item={item} />
                ))}

                {/* 핵심 속성 요약 */}
                <div style={{ marginTop:"4px", marginBottom:"12px" }}>
                  <div style={{ fontWeight:"700", color:"#0f172a", marginBottom:"8px", fontSize:"0.82rem", display:"flex", alignItems:"center", gap:"6px" }}>
                    <span style={{ background:"#3b82f6", color:"white", borderRadius:"4px", padding:"2px 6px", fontSize:"0.68rem" }}>요약</span>
                    핵심 속성 한눈에 보기
                  </div>
                  {lesson.theory.map((t, i) => (
                    <div key={i} style={{ background:"white", border:"1px solid #e2e8f0", borderRadius:"8px", padding:"8px 12px", marginBottom:"6px", display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" }}>
                      <span style={{ background:"#dbeafe", color:"#1d4ed8", padding:"2px 7px", borderRadius:"4px", fontSize:"0.68rem", fontWeight:"600", whiteSpace:"nowrap" }}>{t.label}</span>
                      <code style={{ background:"#1e293b", color:"#7dd3fc", padding:"2px 7px", borderRadius:"4px", fontSize:"0.72rem", whiteSpace:"nowrap" }}>{t.code}</code>
                      <span style={{ fontSize:"0.74rem", color:"#64748b" }}>{t.desc}</span>
                    </div>
                  ))}
                </div>

                {/* HTML 구조 */}
                <div style={{ background:"#fefce8", border:"1px solid #fde047", borderRadius:"10px", padding:"12px" }}>
                  <div style={{ fontWeight:"600", color:"#713f12", marginBottom:"6px", fontSize:"0.8rem" }}>🏗️ 실습에 사용된 HTML 구조</div>
                  <pre style={{ fontFamily:"monospace", fontSize:"0.71rem", color:"#44403c", overflowX:"auto", whiteSpace:"pre-wrap", wordBreak:"break-all", lineHeight:"1.6" }}>{lesson.html}</pre>
                </div>
              </div>
            )}
          </div>

          {/* 오른쪽: 미리보기 */}
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>
            <div style={{ padding:"8px 16px", background:"#f8fafc", borderBottom:"1px solid #e2e8f0", fontSize:"0.77rem", color:"#64748b", display:"flex", alignItems:"center", gap:"8px", flexShrink:0 }}>
              <span style={{ width:"8px", height:"8px", background:"#22c55e", borderRadius:"50%", display:"inline-block" }}></span>
              실시간 미리보기
            </div>
            <iframe ref={previewRef} title="preview" sandbox="allow-scripts" style={{ flex:1, border:"none", background:"white" }} />
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
